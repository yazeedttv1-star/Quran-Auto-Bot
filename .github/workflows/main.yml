name: Daily Quran Video Bot

on:
  schedule:
    - cron: '0 2 * * *' # الساعة 5 صباحاً بتوقيت مصر
  workflow_dispatch: # للتشغيل اليدوي

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4.2.2 

    - name: Set up Python
      uses: actions/setup-python@v5.3.0 
      with:
        python-version: '3.10' # تحديث لإصدار بايثون أحدث وأكثر استقراراً
        cache: 'pip'

    - name: Install FFmpeg and System Fonts
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg fonts-dejavu fonts-noto-core

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install moviepy==1.0.3 requests pillow numpy arabic-reshaper python-bidi
